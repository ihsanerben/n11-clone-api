spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/n11_clone}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

app:
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
  auth:
    jwt-secret: ${JWT_SECRET:local-development-secret-must-be-at-least-32-characters}
    cookie-secure: ${COOKIE_SECURE:false}
  email:
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
