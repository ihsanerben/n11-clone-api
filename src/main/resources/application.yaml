spring:
  application:
    name: n11-clone-api
  autoconfigure:
    exclude: org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN}
  auth:
    jwt-secret: ${JWT_SECRET}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:1200000}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:14}
    verification-expiration-hours: ${EMAIL_VERIFICATION_EXPIRATION_HOURS:24}
    password-reset-expiration-minutes: ${PASSWORD_RESET_EXPIRATION_MINUTES:60}
    refresh-cookie-name: refreshToken
    cookie-secure: ${COOKIE_SECURE:true}
  email:
    from: ${MAIL_FROM:${MAIL_USERNAME}}
    frontend-base-url: ${FRONTEND_BASE_URL}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: native
  error:
    include-message: never
    include-stacktrace: never

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level logger=%logger{36} message=\"%replace(%msg){'\"','\\\"'}\"%n"
